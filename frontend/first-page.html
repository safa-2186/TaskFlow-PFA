<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaSker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-[#3730f5] min-h-screen">

  <!-- NAV -->
  <nav class="bg-white border-b border-gray-200 flex items-center justify-between px-8 h-[68px]">
    <a href="#" class="flex items-center gap-2 text-[1.4rem] font-extrabold text-gray-900 no-underline">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="19" cy="19" r="18" stroke="#3730f5" stroke-width="2.5"/>
        <circle cx="19" cy="19" r="11" stroke="#3730f5" stroke-width="2.5"/>
        <circle cx="19" cy="19" r="4.5" fill="#3730f5"/>
        <path d="M19 1 A18 18 0 0 1 37 19" stroke="#3730f5" stroke-width="3" stroke-linecap="round"/>
      </svg>
      TaSker
    </a>
    <div class="flex flex-col gap-[5px] cursor-pointer p-1">
      <span class="block w-6 h-[2.5px] bg-[#1e2b5e] rounded"></span>
      <span class="block w-6 h-[2.5px] bg-[#1e2b5e] rounded"></span>
      <span class="block w-[18px] h-[2.5px] bg-[#1e2b5e] rounded"></span>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="flex items-center justify-center min-h-[calc(100vh-68px)] p-8">
    <div class="bg-white rounded-3xl w-full max-w-[1400px] min-h-[600px] px-24 py-20 flex items-center justify-between gap-32 shadow-md flex-col md:flex-row">

      <!-- LEFT TEXT -->
      <div class="flex-1 max-w-[560px]">
        <h1 class="text-[3rem] font-bold text-gray-900 leading-tight mb-1">Welcome to</h1>
        <h2 class="text-[2.2rem] font-extrabold text-gray-900 mb-6">Your Task Management Area</h2>
        <p class="text-[1.15rem] text-gray-500 leading-relaxed mb-10 max-w-[430px]">
          task management application that helps you organize your work, track progress, and stay
          productive by managing tasks efficiently in one place.
        </p>
        <button class="bg-[#3730f5] hover:bg-[#2520d4] text-white font-bold text-base px-12 py-4 rounded-full transition-all duration-200 hover:-translate-y-0.5 cursor-pointer border-none">
          Login
        </button>
      </div>

      <!-- RIGHT IMAGE -->
      <div class="flex-1 flex justify-center items-center">
        <img
          src="./img.png/img figma.png"
          alt="Task management illustration"
          class="w-[460px] h-auto object-contain block"
        />
      </div>

    </div>
  </main>

</body>
</html>
