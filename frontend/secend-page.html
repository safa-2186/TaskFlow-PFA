<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaSker Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- NAV -->
  <nav class="bg-white border-b border-gray-200 flex items-center justify-between px-8 h-[68px]">
    <a href="#" class="flex items-center gap-2 text-[1.4rem] font-extrabold text-gray-900 no-underline">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="18" stroke="#3730f5" stroke-width="2.5"/>
        <circle cx="19" cy="19" r="11" stroke="#3730f5" stroke-width="2.5"/>
        <circle cx="19" cy="19" r="4.5" fill="#3730f5"/>
        <path d="M19 1 A18 18 0 0 1 37 19" stroke="#3730f5" stroke-width="3" stroke-linecap="round"/>
      </svg>
      TaSker
    </a>
    <div class="flex items-center gap-4">
      <button class="bg-[#3730f5] hover:bg-[#2520d4] text-white font-bold px-6 py-2 rounded-full transition-all duration-200">Share</button>
      <div class="flex flex-col gap-[5px] cursor-pointer p-1">
        <span class="block w-6 h-[2.5px] bg-gray-700 rounded"></span>
        <span class="block w-6 h-[2.5px] bg-gray-700 rounded"></span>
        <span class="block w-[18px] h-[2.5px] bg-gray-700 rounded"></span>
      </div>
      <div class="flex items-center border border-gray-300 rounded-full px-4 py-2 gap-2 bg-white w-[220px]">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <input type="text" placeholder="Search Here" class="outline-none text-sm text-gray-500 bg-transparent w-full"/>
      </div>
      <button class="text-[#3730f5]">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>
      <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-gray-200">
        <img src="./avatar.png" alt="User avatar" class="w-full h-full object-cover"/>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="p-8 max-w-[1400px] mx-auto">

    

    <!-- TASK CARDS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- To Do -->
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-red-500 font-bold text-lg">To Do List</h2>
          <button class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </button>
        </div>
        <h3 class="text-[1.6rem] font-extrabold text-gray-900 mb-4">Figma Poject</h3>
        <div class="w-full h-1 bg-red-500 rounded mb-4"></div>
        <div class="flex items-center justify-between mb-6">
          <span class="text-gray-500 text-sm">90% Completed</span>
          <span class="text-red-500 font-bold text-sm">By-Adam</span>
        </div>
        <div class="border-t border-gray-100 pt-4 flex items-center justify-between">
          <div><span class="font-bold text-sm">Start Date </span><span class="text-gray-400 text-sm">| </span><span class="text-[#3730f5] font-bold text-sm">02-05</span></div>
          <div><span class="font-bold text-sm">End Date </span><span class="text-gray-400 text-sm">| </span><span class="text-red-500 font-bold text-sm">02-05</span></div>
        </div>
      </div>

      <!-- In Progress -->
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-[#3730f5] font-bold text-lg">In Progress</h2>
          <button class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </button>
        </div>
        <h3 class="text-[1.6rem] font-extrabold text-gray-900 mb-4">Tasker Planing</h3>
        <div class="w-full h-1 bg-[#3730f5] rounded mb-4"></div>
        <div class="flex items-center justify-between mb-6">
          <span class="text-gray-500 text-sm">90% Completed</span>
          <span class="text-[#3730f5] font-bold text-sm">By-Adam</span>
        </div>
        <div class="border-t border-gray-100 pt-4 flex items-center justify-between">
          <div><span class="font-bold text-sm">Start Date </span><span class="text-gray-400 text-sm">| </span><span class="text-[#3730f5] font-bold text-sm">15-05</span></div>
          <div><span class="font-bold text-sm">End Date </span><span class="text-gray-400 text-sm">| </span><span class="text-[#3730f5] font-bold text-sm">15-05</span></div>
        </div>
      </div>

      <!-- Done -->
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-green-600 font-bold text-lg">Done!</h2>
          <button class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </button>
        </div>
        <h3 class="text-[1.6rem] font-extrabold text-gray-900 mb-4">Presentation</h3>
        <div class="w-full h-1 bg-green-500 rounded mb-4"></div>
        <div class="flex items-center justify-between mb-6">
          <span class="text-gray-500 text-sm">90% Completed</span>
          <span class="text-green-600 font-bold text-sm">By-Adam</span>
        </div>
        <div class="border-t border-gray-100 pt-4 flex items-center justify-between">
          <div><span class="font-bold text-sm">Start Date </span><span class="text-gray-400 text-sm">| </span><span class="text-gray-500 font-bold text-sm">25-06</span></div>
          <div><span class="font-bold text-sm">Start Date </span><span class="text-gray-400 text-sm">| </span><span class="text-orange-400 font-bold text-sm">25-06</span></div>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
