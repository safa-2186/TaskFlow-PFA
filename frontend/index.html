<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="font-sans">
    <main class="relative min-h-screen w-full overflow-hidden bg-[#2855DC] flex items-center justify-center px-4">

        <!-- Login card -->
        <section class="relative z-10 w-full max-w-[640px] text-center">
            <h1 class="text-white font-bold text-[77px] sm:text-7xl">Login</h1>
            <p class="mt-6 text-white text-[64px] sm:text-3xl ">
                Please enter your email and your password
            </p>

            <form class="mt-12 flex flex-col items-stretch gap-6">
                <!-- Username / Email -->
                <label
                    class="group flex items-center gap-4 rounded-full border-2 border-white px-7 py-5 transition focus-within:bg-white/5">
                    <svg class="h-7 w-7 shrink-0 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 21c0-4 3.5-6 8-6s8 2 8 6" />
                    </svg>
                    <input type="text" autocomplete="username" placeholder="Username or Email"
                        class="w-full bg-transparent text-xl text-white outline-none" />
                </label>

                <!-- Password -->
                <label
                    class="group flex items-center gap-4 rounded-full border-2 border-white px-7 py-5 transition focus-within:bg-white/5">
                    <svg class="h-7 w-7 shrink-0 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="11" width="14" height="9" rx="2.5" />
                        <path d="M8 11V8a4 4 0 0 1 8 0v3" />
                    </svg>
                    <input type="password" autocomplete="current-password" placeholder="Password"
                        class="w-full bg-transparent text-xl text-white outline-none" />
                </label>

                <!-- Forgot password -->
                <a href="#" class="mt-1 text-center text-xl text-white/95 hover:text-white hover:underline">
                    Forgot Password ?
                </a>

                <!-- Submit -->
                <button type="submit"
                    class="mt-4 w-full rounded-full bg-black py-5 text-2xl font-bold text-white shadow-lg transition hover:bg-neutral-900 active:scale-[0.99]"
                    link="/frontend/first-page.html" >
                    Login
                </button>

            </form>
        </section>
    </main>
</body>

</html>
